title: Mifras — Sri Lanka Private Driver
description: >
  Explore Sri Lanka with Mifras, your trusted private driver and guide.
  Custom tours, airport transfers, and unforgettable multi-day packages
  across the beautiful island of Sri Lanka.

url: "https://shukwong.github.io"
baseurl: "/srilanka"   # ← repo name; remove if using a custom domain or user/org site (username.github.io)

# ──────────────────────────────────────────────────────────────
# DRIVER CONTACT — edit these values to update the whole site
# ──────────────────────────────────────────────────────────────
driver:
  name: Mifras
  phone: "+94 76 063 6310"
  whatsapp: "94760636310"        # Digits only, no + or spaces, for wa.me links
  whatsapp_display: "+94 76 063 6310"
  vehicle: "Air-conditioned Toyota KDH Van"
  experience_years: 10

# ──────────────────────────────────────────────────────────────
# SOCIAL LINKS — leave blank ("") to hide from footer
# ──────────────────────────────────────────────────────────────
social:
  facebook: ""
  instagram: ""
  tripadvisor: ""

# ──────────────────────────────────────────────────────────────
# SEO & SITE META
# ──────────────────────────────────────────────────────────────
author: Mifras
timezone: Asia/Colombo
lang: en
tagline: "Private Driver & Tour Guide in Sri Lanka"
logo: /assets/images/mifras_with_van.jpg

# Google Analytics — replace with your GA4 measurement ID (e.g. G-XXXXXXXXXX)
google_analytics: "G-2X9PDR6L5S"

webmaster_verifications:
  google: 10ecc1cff69e70e6

# ──────────────────────────────────────────────────────────────
# COLLECTIONS
# ──────────────────────────────────────────────────────────────
collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# ──────────────────────────────────────────────────────────────
# PLUGINS
# ──────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# ──────────────────────────────────────────────────────────────
# BUILD SETTINGS
# ──────────────────────────────────────────────────────────────
sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - README.md
  - plan.md
  - "*.sh"
