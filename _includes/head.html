<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Google Fonts — preconnect first, then load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Open Graph image (supplements jekyll-seo-tag) -->
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/mifras_with_van.jpg">
  <meta property="og:image:alt" content="Mifras, Sri Lanka private driver, with his air-conditioned tour van">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/mifras_with_van.jpg">

  <!-- Geo tags for local search relevance -->
  <meta name="geo.region" content="LK">
  <meta name="geo.placename" content="Sri Lanka">
  <meta name="geo.position" content="7.8731;80.7718">
  <meta name="ICBM" content="7.8731, 80.7718">

  <!-- Favicon (emoji fallback — replace with real favicon.ico) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">

  {% include google-analytics.html %}

  <!-- jekyll-seo-tag: generates title, description, canonical, OG, Twitter, and JSON-LD -->
  {% seo %}
</head>
