<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "itemListElement": [
    {% for service in site.data.services %}
    {
      "@type": "ListItem",
      "position": {{ forloop.index }},
      "item": {
        "@type": "Service",
        "name": {{ service.title | jsonify }},
        "description": {{ service.description | strip_newlines | strip | jsonify }},
        "provider": {
          "@type": "LocalBusiness",
          "name": "{{ site.title }}"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Sri Lanka"
        }
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
